[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# Canonical host + HTTPS
[[redirects]]
  from = "http://voiceover-captions-ai.com/*"
  to = "https://voiceover-captions-ai.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.voiceover-captions-ai.com/*"
  to = "https://voiceover-captions-ai.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.voiceover-captions-ai.com/*"
  to = "https://voiceover-captions-ai.com/:splat"
  status = 301
  force = true

